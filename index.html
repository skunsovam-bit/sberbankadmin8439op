<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SberBank Joke Admin</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root { --main: #21a038; --dark: #1a1a1a; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f0f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 360px; text-align: center; }
        h2 { color: var(--main); margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 14px; background: var(--main); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { opacity: 0.9; }
        button:disabled { background: #999; }
        .hidden { display: none; }
        .bank-card { background: linear-gradient(135deg, #27ae60, #1e8449); color: white; padding: 20px; border-radius: 12px; text-align: left; margin-top: 20px; font-family: monospace; position: relative; overflow: hidden; }
    </style>
</head>
<body>

<div class="card">
    <h2 id="status">SberBank Joke</h2>
    
    <div id="step1">
        <input type="text" id="login" placeholder="Придумайте логин">
        <input type="email" id="email" placeholder="Email клиента">
        <button id="sendBtn" onclick="sendCode()">Продолжить</button>
    </div>

    <div id="step2" class="hidden">
        <p>Код подтверждения отправлен!</p>
        <input type="text" id="vCode" placeholder="6-значный код" maxlength="6">
        <button id="verifyBtn" onclick="verifyCode()">Подтвердить</button>
    </div>

    <div id="step3" class="hidden">
        <div id="cardResult" class="bank-card"></div>
        <p style="font-size: 12px; color: #666; margin-top: 15px;">Счет успешно сохранен в Firebase</p>
        <button onclick="location.reload()">Создать еще один</button>
    </div>
</div>

<script type="module">
    // Подключаем нужные функции Firebase
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // Твои настройки Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyBL2Xc2ikGbTLBxW4on9_w9vmuwiD_y6JU",
        authDomain: "ssberbank.firebaseapp.com",
        projectId: "ssberbank",
        storageBucket: "ssberbank.firebasestorage.app",
        messagingSenderId: "426010580285",
        appId: "1:426010580285:web:4d47d5a9f422107590e154"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Твои настройки EmailJS
    emailjs.init("Xwo8LIbUCsfK5J6f8");

    let correctCode = "";
    let tempUser = {};

    window.sendCode = function() {
        const login = document.getElementById('login').value;
        const email = document.getElementById('email').value;

        if(!login || !email) return alert("Заполни все поля");

        correctCode = Math.floor(100000 + Math.random() * 900000).toString();
        tempUser = { login, email };

        const btn = document.getElementById('sendBtn');
        btn.disabled = true;
        btn.innerText = "Отправка...";

        // Отправка через твой сервис
        emailjs.send("service_hkwneaf", "template_bfe6oof", { // Замени YOUR_TEMPLATE_ID на свой из EmailJS
            to_email: email,
            code: correctCode
        }).then(() => {
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
        }).catch(err => {
            alert("Ошибка почты: " + JSON.stringify(err));
            btn.disabled = false;
        });
    };

    window.verifyCode = async function() {
        const input = document.getElementById('vCode').value;
        if(input !== correctCode) return alert("Неверный код!");

        // Генерация данных карты
        const cardNumber = "4276" + Math.floor(Math.random() * 1000000000000).toString().padStart(12, '0');
        const cvv = Math.floor(100 + Math.random() * 899);
        const exp = "04/36"; // 10 лет

        const account = {
            login: tempUser.login,
            email: tempUser.email,
            cardNumber: cardNumber,
            cvv: cvv,
            expiry: exp,
            balance: 0
        };

        try {
            // Сохраняем в твою базу ssberbank
            await setDoc(doc(db, "accounts", tempUser.login), account);

            document.getElementById('cardResult').innerHTML = `
                <div style="font-size: 14px; margin-bottom: 20px;">Joke SberBank</div>
                <div style="font-size: 18px; letter-spacing: 2px; margin-bottom: 10px;">
                    ${cardNumber.replace(/(.{4})/g, '$1 ')}
                </div>
                <div style="display: flex; justify-content: space-between; font-size: 12px;">
                    <span>EXP: ${exp}</span>
                    <span>CVV: ${cvv}</span>
                </div>
                <div style="margin-top: 10px; font-weight: bold;">${tempUser.login.toUpperCase()}</div>
            `;

            document.getElementById('step2').classList.add('hidden');
            document.getElementById('step3').classList.remove('hidden');
        } catch (e) {
            alert("Ошибка сохранения в базу: " + e.message);
        }
    };
</script>

</body>
</html>
